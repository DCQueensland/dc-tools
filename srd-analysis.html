/* Layout */

.sidebar{width:240px;background:#111;border-right:1px solid #333;overflow-y:auto;flex-shrink:0;padding:16px 0;}

.main{flex:1;overflow-y:auto;padding:32px;}

.tab:hover{color:#ccc;}
.tab.active{color:#ffc708;border-bottom-color:#ffc708;}
.tab-content{display:none;}
.tab-content.active{display:block;}

.stat-card{background:#242424;border:1px solid #333;border-radius:12px;padding:24px;}
.stat-card .label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#999;margin-bottom:8px;}
.stat-card .value{font-size:28px;font-weight:700;color:#ffc708;}
.stat-card .detail{font-size:13px;color:#999;margin-top:4px;}

table.score-table th,table.score-table td{padding:10px 12px;text-align:center;border:1px solid #333;}
table.score-table th{background:#111;color:#ccc;font-weight:600;position:sticky;top:0;z-index:1;}

.score-5,.score-6{background:#ffa50033 !important;color:#ffa500;}
.score-7,.score-8{background:#84c44c33 !important;color:#84c44c;}
.score-9,.score-10{background:#ffc70833 !important;color:#ffc708;}

.bar-track{flex:1;height:24px;background:#333;border-radius:4px;position:relative;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:700;color:#000;min-width:32px;}

.bar-fill.yellow{background:#ffc708;}
.bar-fill.amber{background:#ffa500;}
.bar-fill.red{background:#ff6347;}

.list-card h3 .dot.red{background:#ff6347;}

.list-card li{font-size:13px;color:#ccc;margin-bottom:8px;line-height:1.5;}
.list-card li strong{color:#fff;}

.theme-block{margin-bottom:18px;}

.theme-tag{background:#333;color:#ccc;font-size:12px;padding:4px 12px;border-radius:16px;border:1px solid #444;}

.individual-select{margin-bottom:24px;}

// HELPERS
// ============================================================
function avg(arr){ return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function r1(n){ return Math.round(n*10)/10; }
function scoreClass(v){ v=Math.round(v); if(v<=4) return 'score-'+v; if(v<=6) return 'score-'+v; if(v<=8) return 'score-'+v; return 'score-'+Math.min(v,10); }
function barColor(v){ if(v>=8.5) return 'yellow'; if(v>=7) return 'green'; if(v>=5) return 'amber'; return 'red'; }
function firstName(name){ return name.split(' ')[0]; }

function computeAverages(participants, profileKey){
  const keys = Object.keys(participants[0][profileKey]);
  const result = {};
  keys.forEach(k => {
    result[k] = r1(avg(participants.map(p => p[profileKey][k])));
  });
  return result;
}

function allProfileAverages(participants){
  const profiles = ['leadershipDNA','uylp','lfr'];
  const all = [];
  profiles.forEach(pk => {
    const avgs = computeAverages(participants, pk);
    Object.values(avgs).forEach(v => all.push(v));
  });
  return all;
}

function getTopAndBottom(participants){
  const profiles = [
    {key:'leadershipDNA', label:'Leadership DNA'},
    {key:'uylp', label:'UYLP'},
    {key:'lfr', label:'Leadership for Results'}
  ];
  const combined = [];
  profiles.forEach(p => {
    const avgs = computeAverages(participants, p.key);
    Object.entries(avgs).forEach(([comp,val]) => {
      combined.push({comp, val, profile: p.label});
    });
  });
  combined.sort((a,b) => b.val - a.val);
  const top5 = combined.slice(0,5);
  const bottom5 = combined.sort((a,b) => a.val - b.val).slice(0,5);
  return {top5, bottom5};
}

function generateThemes(participants){
  const questions = ['q1','q2','q3','q4','q5'];
  const themes = {};
  questions.forEach(q => {
    const allResponses = [];
    participants.forEach(p => {
      p.strategic[q].forEach(r => allResponses.push(r.toLowerCase()));
    });
    // Find common words/phrases
    const wordMap = {};
    const themeKeywords = {
      'family': 'Family-Owned Values',
      'team': 'Teamwork & Culture',
      'customer': 'Customer Focus',
      'adapt': 'Adaptability',
      'flexib': 'Flexibility',
      'growth': 'Business Growth',
      'automation': 'Automation & Technology',
      'technology': 'Automation & Technology',
      'ai': 'AI & Innovation',
      'leadership': 'Leadership Development',
      'leader': 'Leadership Development',
      'alignment': 'Alignment & Engagement',
      'engagement': 'Alignment & Engagement',
      'listen': 'Active Listening',
      'coaching': 'Coaching & Mentoring',
      'mentoring': 'Coaching & Mentoring',
      'investment': 'Investment & Growth',
      'expansion': 'Expansion',
      'legacy': 'Legacy & Heritage',
      'people': 'People & Relationships',
      'communication': 'Communication',
      'trust': 'Trust & Authenticity',
      'change': 'Change Management',
      'innovation': 'Innovation',
      'delegat': 'Delegation',
      'planning': 'Planning & Strategy',
      'strategy': 'Planning & Strategy',
      'motivation': 'Motivation & Drive',
      'open': 'Openness & Humility',
      'skill': 'Skills Development',
      'upskill': 'Skills Development',
      'culture': 'Teamwork & Culture',
      'vision': 'Vision Setting'
    };
    const found = {};
    allResponses.forEach(r => {
      Object.entries(themeKeywords).forEach(([kw, theme]) => {
        if(r.includes(kw)){
          found[theme] = (found[theme]||0) + 1;
        }
      });
    });
    // Sort by frequency, take top themes (those mentioned by 2+ people)
    themes[q] = Object.entries(found)
      .filter(([,c]) => c >= 2)
      .sort((a,b) => b[1] - a[1])
      .map(([t]) => t);
    if(themes[q].length === 0){
      // fallback: take top mentioned
      themes[q] = Object.entries(found).sort((a,b) => b[1] - a[1]).slice(0,3).map(([t]) => t);
    }
  });
  return themes;
}

function renderBarChart(avgsObj, sorted){
  let entries = Object.entries(avgsObj);

  entries.forEach(([label, val]) => {

      <div class="bar-label">${label}</div>
      <div class="bar-track"><div class="bar-fill ${barColor(val)}" style="width:${pct}%">${r1(val)}</div></div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderIndividualRadar(p, profiles){
  // Build a simplified radar using SVG
  // Combine all profile scores into one radar with color coding per profile
  const profileColors = ['#ffc708','#84c44c','#0090cf'];
  const cx = 200, cy = 200, maxR = 160;
  const allKeys = [];
  const allProfiles = [];

  profiles.forEach((prof,pi) => {
    const keys = Object.keys(p[prof.key]);
    const vals = Object.values(p[prof.key]);
    allProfiles.push({keys, vals, color: profileColors[pi], label: prof.label});
  });

  // Draw separate radar for each profile overlaid
  // Use the profile with most items to set the grid
  let svg = `<div class="radar-container"><svg class="radar-svg" viewBox="0 0 400 420" width="400" height="420">`;

  // Draw grid circles
  for(let i=1;i<=5;i++){
    const r = (maxR/5)*i;
    svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#333" stroke-width="1"/>`;
    svg += `<text x="${cx+4}" y="${cy-r+12}" fill="#666" font-size="9">${i*2}</text>`;
  }

  // Draw each profile as a polygon
  allProfiles.forEach((prof,pi) => {
    const n = prof.keys.length;
    const angleStep = (Math.PI*2)/n;
    let points = '';
    prof.vals.forEach((v,i) => {
      const angle = angleStep*i - Math.PI/2;
      const r = (v/10)*maxR;
      const x = cx + r*Math.cos(angle);
      const y = cy + r*Math.sin(angle);
      points += `${x},${y} `;
    });
    svg += `<polygon points="${points}" fill="${prof.color}22" stroke="${prof.color}" stroke-width="2"/>`;

    // Dots
    prof.vals.forEach((v,i) => {
      const angle = angleStep*i - Math.PI/2;
      const r = (v/10)*maxR;
      const x = cx + r*Math.cos(angle);
      const y = cy + r*Math.sin(angle);
      svg += `<circle cx="${x}" cy="${y}" r="3" fill="${prof.color}"/>`;
    });
  });

  // Legend
  svg += `<text x="10" y="410" fill="#ffc708" font-size="11" font-weight="bold">&#9632; Leadership DNA</text>`;
  svg += `<text x="150" y="410" fill="#84c44c" font-size="11" font-weight="bold">&#9632; UYLP</text>`;
